<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync Pro UI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 50%);
            color: #ffffff;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            min-height: 100vh;
        }

        /* Custom Dark Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        .glass-panel {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .watchlist-item {
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .watchlist-item:hover {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .neon-text-green {
            color: #00e676;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
        }
        .neon-text-red {
            color: #ff3d00;
            text-shadow: 0 0 10px rgba(255, 61, 0, 0.3);
        }

        .number-font { font-family: 'JetBrains Mono', monospace; }
        
        input::placeholder { color: #555; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            const [active, setActive] = useState({ id: 'XAU', name: 'GOLD', tv: 'OANDA:XAUUSD', tag: 'PAXGUSDT', type: 'B' });
            
            const [list, setList] = useState([
                { id: 'XAU', name: 'GOLD', tag: 'PAXGUSDT', tv: 'OANDA:XAUUSD', type: 'B' },
                { id: 'XAG', name: 'SILVER', tag: 'XAGUSDT', tv: 'OANDA:XAGUSD', type: 'B' },
                { id: 'US30', name: 'DOW 30', tag: 'DJI', tv: 'CURRENCYCOM:US30', type: 'F' },
                { id: 'EUR', name: 'EUR/USD', tag: 'EURUSDT', tv: 'FX:EURUSD', type: 'B' },
                { id: 'TSLA', name: 'TESLA', tag: 'TSLA', tv: 'NASDAQ:TSLA', type: 'F' },
                { id: 'BTC', name: 'BITCOIN', tag: 'BTCUSDT', tv: 'BINANCE:BTCUSD', type: 'B' }
            ]);

            const [prices, setPrices] = useState({});
            const [signals, setSignals] = useState({ scalping: 'BUY SCALP', day: 'BULLISH', swing: 'HOLDING' });
            const [newTicker, setNewTicker] = useState('');
            
            const API_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            const getPrice = async (item) => {
                try {
                    if (item.type === 'B') {
                        const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${item.tag}`);
                        const d = await r.json();
                        return d.price ? parseFloat(d.price) : 0;
                    } else {
                        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${item.tag}&token=${API_KEY}`);
                        const d = await r.json();
                        return d.c ? d.c : 0;
                    }
                } catch (e) { return 0; }
            };

            const refreshAll = async () => {
                const results = {};
                for (const item of list) {
                    results[item.id] = await getPrice(item);
                }
                setPrices(results);

                const currentPrice = results[active.id];
                if (currentPrice > 0) {
                    setSignals({
                        scalping: Math.random() > 0.5 ? 'BUY SCALP' : 'SELL SCALP',
                        day: currentPrice > (prices[active.id] || 0) ? 'BULLISH' : 'BEARISH',
                        swing: 'MONITORING'
                    });
                }
            };

            useEffect(() => {
                refreshAll();
                const timer = setInterval(refreshAll, 10000);
                return () => clearInterval(timer);
            }, [active.id, list.length]);

            return (
                <div className="glass-panel" style={{ width: '100%', maxWidth: '420px', padding: '24px', boxSizing: 'border-box' }}>
                    
                    {/* Header */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px' }}>
                        <div style={{ fontSize: '18px', fontWeight: '900', letterSpacing: '-0.5px' }}>
                            TradeSync<span style={{ color: '#00e676' }}>.Pro</span>
                        </div>
                        <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                            <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: '#00e676', boxShadow: '0 0 8px #00e676', animation: 'pulse 2s infinite' }}></div>
                            <span style={{ fontSize: '10px', color: '#888', fontWeight: '600', letterSpacing: '1px' }}>LIVE</span>
                        </div>
                    </div>

                    {/* Main Active Asset */}
                    <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                        <div style={{ fontSize: '12px', color: '#888', fontWeight: '600', letterSpacing: '1px', textTransform: 'uppercase' }}>
                            {active.name} / USD
                        </div>
                        <div className="number-font" style={{ fontSize: '46px', fontWeight: '800', margin: '4px 0', letterSpacing: '-2px' }}>
                            ${prices[active.id] ? prices[active.id].toLocaleString(undefined, {minimumFractionDigits: 2}) : '---'}
                        </div>
                    </div>

                    {/* AI Signal Pills */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', gap: '10px', marginBottom: '24px' }}>
                        {Object.entries(signals).map(([k, v]) => {
                            const isBuy = v.includes('BUY') || v.includes('BULL');
                            const isSell = v.includes('SELL') || v.includes('BEAR');
                            return (
                                <div key={k} style={{ 
                                    flex: 1, 
                                    background: isBuy ? 'rgba(0, 230, 118, 0.1)' : isSell ? 'rgba(255, 61, 0, 0.1)' : 'rgba(255, 255, 255, 0.05)', 
                                    border: `1px solid ${isBuy ? 'rgba(0, 230, 118, 0.3)' : isSell ? 'rgba(255, 61, 0, 0.3)' : 'rgba(255, 255, 255, 0.1)'}`,
                                    padding: '10px 4px', 
                                    borderRadius: '12px', 
                                    textAlign: 'center' 
                                }}>
                                    <div style={{ fontSize: '9px', color: '#888', marginBottom: '4px', fontWeight: '600', textTransform: 'uppercase' }}>{k}</div>
                                    <div className={isBuy ? 'neon-text-green' : isSell ? 'neon-text-red' : ''} style={{ fontSize: '11px', fontWeight: '800' }}>
                                        {v}
                                    </div>
                                </div>
                            )
                        })}
                    </div>

                    {/* TradingView Chart Container */}
                    <div style={{ height: '200px', width: '100%', marginBottom: '24px', borderRadius: '16px', overflow: 'hidden', border: '1px solid rgba(255, 255, 255, 0.08)', background: '#0a0a0a' }}>
                        <iframe 
                            src={`https://s.tradingview.com/widgetembed/?symbol=${active.tv}&interval=15&hidesidetoolbar=1&symboledit=0&saveimage=0&toolbarbg=000000&studies=[]&theme=dark&style=3&timezone=Asia%2FAmman`}
                            style={{ width: '100%', height: '100%', border: 'none' }}
                        />
                    </div>

                    {/* Watchlist Section */}
                    <div style={{ fontSize: '11px', color: '#666', fontWeight: '800', marginBottom: '10px', letterSpacing: '1px' }}>WATCHLIST</div>
                    <div style={{ maxHeight: '180px', overflowY: 'auto', paddingRight: '4px', marginBottom: '20px' }}>
                        {list.map(item => (
                            <div key={item.id} className="watchlist-item" onClick={() => setActive(item)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px', background: 'rgba(0, 0, 0, 0.4)', borderRadius: '14px', marginBottom: '8px', cursor: 'pointer' }}>
                                <div style={{ display: 'flex', flexDirection: 'column' }}>
                                    <span style={{ fontSize: '14px', fontWeight: '800' }}>{item.id}</span>
                                    <span style={{ fontSize: '10px', color: '#666', fontWeight: '600' }}>{item.name}</span>
                                </div>
                                <span className="number-font" style={{ fontSize: '14px', color: prices[item.id] > 0 ? '#fff' : '#444', fontWeight: '700' }}>
                                    {prices[item.id] ? `$${prices[item.id].toLocaleString()}` : '---'}
                                </span>
                            </div>
                        ))}
                    </div>

                    {/* Add New Asset Input */}
                    <div style={{ display: 'flex', gap: '8px' }}>
                        <input 
                            value={newTicker} 
                            onChange={(e) => setNewTicker(e.target.value)} 
                            placeholder="Add ticker (e.g., AAPL, GBPUSD)" 
                            style={{ flex: 1, background: 'rgba(0, 0, 0, 0.5)', color: '#fff', border: '1px solid rgba(255,255,255,0.1)', padding: '14px', borderRadius: '12px', outline: 'none', fontSize: '13px', fontWeight: '600' }} 
                        />
                        <button 
                            onClick={() => { if(newTicker) { setList([...list, { id: newTicker.toUpperCase(), name: newTicker.toUpperCase(), tag: newTicker.toUpperCase(), tv: newTicker.toUpperCase(), type: 'F' }]); setNewTicker(''); }}} 
                            style={{ background: '#fff', border: 'none', padding: '0 20px', borderRadius: '12px', fontWeight: '900', cursor: 'pointer', color: '#000', fontSize: '16px', transition: '0.2s' }}
                        >
                            +
                        </button>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
