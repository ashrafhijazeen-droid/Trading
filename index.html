<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            const [input, setInput] = useState('XAU');
            const [price, setPrice] = useState(null);
            const [status, setStatus] = useState('SYSTEM READY');
            const [signals, setSignals] = useState({ scalping: '...', day: '...', swing: '...' });
            
            const FINNHUB_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            const runScan = async () => {
                setStatus('SCANNING...');
                let sym = input.toUpperCase().trim();
                let success = false;

                try {
                    // 1. Try Binance for Gold/Forex (Using PAXG for Gold, or direct pairs)
                    let binanceSym = sym === 'XAU' || sym === 'XAUUSD' || sym === 'GOLD' ? 'PAXGUSDT' : sym + 'USDT';
                    const bRes = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${binanceSym}`);
                    const bData = await bRes.json();
                    
                    if (bData && bData.price) {
                        const val = parseFloat(bData.price);
                        setPrice(val);
                        setStatus('LIVE (COMMODITY FEED)');
                        
                        // Local Signal Generator
                        setSignals({
                            scalping: val % 2 === 0 ? 'BUY MOMENTUM' : 'SELL MOMENTUM',
                            day: 'VOLATILITY ACTIVE',
                            swing: 'MONITORING STRUCTURE'
                        });
                        success = true;
                    }

                    // 2. If Binance fails, try Finnhub for Stocks
                    if (!success) {
                        const fRes = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_KEY}`);
                        const fData = await fRes.json();
                        if (fData && fData.c && fData.c !== 0) {
                            setPrice(fData.c);
                            setStatus('LIVE (EQUITY FEED)');
                            setSignals({ scalping: 'STABLE', day: 'TREND ALIGNED', swing: 'LONG TERM BIAS' });
                            success = true;
                        }
                    }
                } catch (e) { console.log(e); }

                if (!success) {
                    setStatus('SYMBOL NOT FOUND');
                    setPrice(null);
                }
            };

            useEffect(() => { runScan(); }, []);

            return (
                <div style={{ padding: '30px', background: '#0a0a0a', borderRadius: '30px', border: '1px solid #222', width: '300px', textAlign: 'center' }}>
                    <div style={{ fontSize: '9px', color: '#444', marginBottom: '15px' }}>GLOBAL MARKET SCANNER</div>
                    
                    <input 
                        value={input} 
                        onChange={(e) => setInput(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && runScan()}
                        style={{ background: '#000', color: '#00ff88', border: '1px solid #333', width: '100%', padding: '12px', borderRadius: '10px', textAlign: 'center', fontSize: '18px', fontWeight: 'bold', outline: 'none' }}
                        placeholder="XAU, BTC, or TSLA"
                    />

                    <div style={{ margin: '20px 0' }}>
                        <div style={{ fontSize: '40px', fontWeight: '900', color: '#fff' }}>
                            {price ? `$${price.toLocaleString()}` : '---'}
                        </div>
                        <div style={{ fontSize: '9px', color: status.includes('LIVE') ? '#00ff88' : '#f59e0b' }}>{status}</div>
                    </div>

                    <div style={{ textAlign: 'left' }}>
                        {Object.entries(signals).map(([k, v]) => (
                            <div key={k} style={{ background: '#111', padding: '10px', borderRadius: '8px', marginBottom: '8px', border: '1px solid #1a1a1a' }}>
                                <div style={{ fontSize: '7px', color: '#555' }}>{k.toUpperCase()}</div>
                                <div style={{ fontSize: '11px', color: '#fff', fontWeight: 'bold' }}>{v}</div>
                            </div>
                        ))}
                    </div>

                    <button onClick={runScan} style={{ width: '100%', padding: '12px', background: '#222', border: 'none', borderRadius: '10px', color: '#fff', fontSize: '10px', marginTop: '10px', cursor: 'pointer' }}>
                        REFRESH SIGNAL
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
