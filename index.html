<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: monospace;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            const [input, setInput] = useState('OANDA:XAU_USD');
            const [symbol, setSymbol] = useState('OANDA:XAU_USD');
            const [price, setPrice] = useState(null);
            const [status, setStatus] = useState('INITIALIZING');
            const [signals, setSignals] = useState({ scalping: '...', day: '...', swing: '...' });
            
            const API_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            const fetchData = async () => {
                setStatus('SCANNING...');
                try {
                    // 1. Get Price
                    const pR = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`);
                    const pD = await pR.json();
                    
                    if (pD && pD.c !== 0 && pD.c !== null) {
                        setPrice(pD.c);
                        setStatus('LIVE');
                    } else {
                        setStatus('SYMBOL ERROR / MARKET CLOSED');
                    }

                    // 2. Get Indicators
                    const tR = await fetch(`https://finnhub.io/api/v1/scan/technical-indicator?symbol=${symbol}&resolution=D&token=${API_KEY}`);
                    const tD = await tR.json();
                    
                    if (tD && tD.technicalIndicator) {
                        const { buy, sell, rsi } = tD.technicalIndicator;
                        setSignals({
                            scalping: rsi < 30 ? 'BUY (OVERSOLD)' : rsi > 70 ? 'SELL (OVERBOUGHT)' : 'WAIT',
                            day: buy > sell ? 'BUY TREND' : 'SELL TREND',
                            swing: buy > 15 ? 'STRONG LONG' : 'NEUTRAL'
                        });
                    }
                } catch (err) {
                    setStatus('CONNECTION ERROR');
                }
            };

            useEffect(() => { fetchData(); }, [symbol]);

            const handleKey = (e) => {
                if (e.key === 'Enter') {
                    let s = input.toUpperCase().trim();
                    if (s === 'GOLD' || s === 'XAU') s = 'OANDA:XAU_USD';
                    if (s === 'SILVER' || s === 'XAG') s = 'OANDA:XAG_USD';
                    setSymbol(s);
                }
            };

            return (
                <div style={{ padding: '20px', maxWidth: '400px', margin: '0 auto' }}>
                    <div style={{ border: '1px solid #333', padding: '15px', borderRadius: '15px', marginBottom: '15px', textAlign: 'center' }}>
                        <input 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)}
                            onKeyDown={handleKey}
                            style={{ background: '#000', color: '#3b82f6', border: '1px solid #333', width: '100%', padding: '10px', borderRadius: '8px', boxSizing: 'border-box', textAlign: 'center', fontWeight: 'bold' }}
                            placeholder="TYPE SYMBOL + ENTER"
                        />
                        <div style={{ fontSize: '35px', fontWeight: '900', margin: '15px 0' }}>
                            {price ? `$${price.toFixed(2)}` : '---'}
                        </div>
                        <div style={{ fontSize: '10px', color: status === 'LIVE' ? '#22c55e' : '#f59e0b' }}>
                            STATUS: {status}
                        </div>
                    </div>

                    {['scalping', 'day', 'swing'].map(s => (
                        <div key={s} style={{ background: '#111', padding: '15px', borderRadius: '10px', marginBottom: '10px', border: '1px solid #222' }}>
                            <div style={{ fontSize: '9px', color: '#555', marginBottom: '5px' }}>{s.toUpperCase()} ACTION</div>
                            <div style={{ fontSize: '14px', fontWeight: 'bold', color: signals[s].includes('BUY') ? '#22c55e' : signals[s].includes('SELL') ? '#ef4444' : '#fff' }}>
                                {signals[s]}
                            </div>
                        </div>
                    ))}
                    
                    <button onClick={fetchData} style={{ width: '100%', padding: '10px', background: '#333', border: 'none', borderRadius: '8px', color: '#fff', fontSize: '10px', cursor: 'pointer', marginTop: '10px' }}>
                        FORCE REFRESH
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
