<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync Pro Terminal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 50%);
            color: #ffffff;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .glass-panel {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .watchlist-item { transition: all 0.2s ease; border: 1px solid transparent; }
        .watchlist-item:hover { background: rgba(255, 255, 255, 0.03); transform: translateX(4px); }
        .active-item { border: 1px solid rgba(0, 230, 118, 0.3) !important; background: rgba(0, 230, 118, 0.05) !important; }

        .neon-text-green { color: #00e676; text-shadow: 0 0 10px rgba(0, 230, 118, 0.3); }
        .neon-text-red { color: #ff3d00; text-shadow: 0 0 10px rgba(255, 61, 0, 0.3); }
        .number-font { font-family: 'JetBrains Mono', monospace; }
        input::placeholder { color: #555; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function TradeSyncPro() {
            const [active, setActive] = useState({ id: 'XAU', name: 'GOLD', tv: 'OANDA:XAUUSD', tag: 'PAXGUSDT', type: 'B', search: 'GOLD', market: 'COMMODITIES' });
            
            const [list, setList] = useState([
                { id: 'XAU', name: 'GOLD', tag: 'PAXGUSDT', tv: 'OANDA:XAUUSD', type: 'B', search: 'GOLD', market: 'COMMODITIES' },
                { id: 'XAG', name: 'SILVER', tag: 'XAGUSDT', tv: 'OANDA:XAGUSD', type: 'B', search: 'SILVER', market: 'COMMODITIES' },
                { id: 'SPY', name: 'S&P 500', tag: 'SPY', tv: 'AMEX:SPY', type: 'F', search: 'S&P 500', market: 'US EQUITIES' },
                { id: 'EUR', name: 'EUR/USD', tag: 'EURUSDT', tv: 'FX:EURUSD', type: 'B', search: 'FOREX', market: 'FOREX' },
                { id: 'TSLA', name: 'TESLA', tag: 'TSLA', tv: 'NASDAQ:TSLA', type: 'F', search: 'TSLA', market: 'US EQUITIES' },
                { id: 'BTC', name: 'BITCOIN', tag: 'BTCUSDT', tv: 'BINANCE:BTCUSD', type: 'B', search: 'CRYPTO', market: 'CRYPTO' }
            ]);

            const [prices, setPrices] = useState({});
            const prevPrices = useRef({}); 
            const prevSignals = useRef({ scalping: 'ANALYZING', day: 'ANALYZING', swing: 'ANALYZING' }); // Signal Memory added
            const [signals, setSignals] = useState({ scalping: 'ANALYZING', day: 'ANALYZING', swing: 'ANALYZING' });
            
            const [newsFeed, setNewsFeed] = useState([]);
            const [marketStatus, setMarketStatus] = useState({ text: 'CHECKING...', color: '#f59e0b' });
            const [newTicker, setNewTicker] = useState('');
            
            const API_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            const getMarketData = async (item) => {
                try {
                    if (item.type === 'B') {
                        const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${item.tag}`);
                        if (!r.ok) return null;
                        const d = await r.json();
                        return { c: parseFloat(d.lastPrice), dp: parseFloat(d.priceChangePercent) };
                    } else {
                        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${item.tag}&token=${API_KEY}`);
                        if (!r.ok) return null;
                        const d = await r.json();
                        return d.c && d.c !== 0 ? { c: d.c, dp: d.dp || 0 } : null;
                    }
                } catch (e) { return null; }
            };

            const getNews = async (symbolData) => {
                try {
                    let endpoint = `https://finnhub.io/api/v1/news?category=general&token=${API_KEY}`;
                    if (symbolData.type === 'F' && symbolData.id !== 'SPY') {
                        const today = new Date().toISOString().split('T')[0];
                        const lastWeek = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                        endpoint = `https://finnhub.io/api/v1/company-news?symbol=${symbolData.id}&from=${lastWeek}&to=${today}&token=${API_KEY}`;
                    }
                    const res = await fetch(endpoint);
                    const data = await res.json();
                    
                    let filtered = data;
                    if (symbolData.type === 'B' || symbolData.id === 'SPY') {
                        filtered = data.filter(n => (n.headline || '').toUpperCase().includes(symbolData.search) || (n.summary || '').toUpperCase().includes(symbolData.search));
                        if (filtered.length === 0) filtered = data;
                    }
                    setNewsFeed(filtered.slice(0, 2)); 
                } catch (e) {
                    setNewsFeed([{ headline: 'News API throttled. Waiting for refresh.', source: 'System', url: '#' }]);
                }
            };

            const checkMarketStatus = (item) => {
                const now = new Date();
                const day = now.getUTCDay();
                const hour = now.getUTCHours();
                
                if (item.market === 'CRYPTO') return { text: 'MARKET LIVE 24/7', color: '#00e676' };
                if (item.market === 'FOREX' || item.market === 'COMMODITIES') {
                    if (day === 6 || (day === 5 && hour >= 21) || (day === 0 && hour < 21)) return { text: 'MARKET CLOSED', color: '#ff3d00' };
                    return { text: 'MARKET LIVE', color: '#00e676' };
                }
                if (item.market === 'US EQUITIES') {
                    if (day === 0 || day === 6) return { text: 'MARKET CLOSED', color: '#ff3d00' };
                    if (hour >= 13 && hour < 21) return { text: 'MARKET OPEN', color: '#00e676' };
                    return { text: 'AFTER-HOURS', color: '#f59e0b' };
                }
                return { text: 'LIVE FEED', color: '#00e676' };
            };

            const refreshAll = async () => {
                const newPrices = {};
                for (const item of list) { 
                    const data = await getMarketData(item);
                    if (data !== null) newPrices[item.id] = data;
                }

                const activeNew = newPrices[active.id];
                const activeOld = prevPrices.current[active.id];

                if (activeNew) {
                    const currentPrice = activeNew.c;
                    const dailyPct = activeNew.dp; 
                    
                    // --- THE SCALP MEMORY LATCH FIX ---
                    // Start by assuming the last known scalp direction
                    let currentScalp = prevSignals.current.scalping; 

                    if (activeOld && currentPrice > activeOld.c) {
                        currentScalp = 'BUY TICK'; // Price actually went up
                    } else if (activeOld && currentPrice < activeOld.c) {
                        currentScalp = 'SELL TICK'; // Price actually went down
                    } else if (currentScalp === 'ANALYZING' || currentScalp.includes('WAITING')) {
                        // If we just loaded, or it's dead, fall back to micro-momentum
                        currentScalp = dailyPct > 0 ? 'MICRO UPTREND' : 'MICRO DOWNTREND';
                    }
                    // If price is identical to last tick, it simply keeps 'currentScalp' (the memory).

                    const newGeneratedSignals = {
                        scalping: currentScalp,
                        day: dailyPct > 0.5 ? 'STRONG BUY' : dailyPct < -0.5 ? 'STRONG SELL' : dailyPct > 0 ? 'BULLISH BIAS' : 'BEARISH BIAS',
                        swing: dailyPct > 1.5 ? 'HOLD LONG' : dailyPct < -1.5 ? 'HOLD SHORT' : dailyPct > 0 ? 'UPTREND' : 'DOWNTREND'
                    };

                    setSignals(newGeneratedSignals);
                    prevSignals.current = newGeneratedSignals; // Save signals to memory
                }

                setPrices(prev => {
                    const current = { ...prev };
                    Object.keys(newPrices).forEach(k => { current[k] = newPrices[k]; });
                    prevPrices.current = current; 
                    return current;
                });
            };

            // --- LIFECYCLES ---
            useEffect(() => {
                getNews(active);
                setMarketStatus(checkMarketStatus(active));
                refreshAll();
            }, [active.id]); 

            useEffect(() => {
                const timer = setInterval(() => {
                    refreshAll();
                    setMarketStatus(checkMarketStatus(active));
                }, 15000); 
                return () => clearInterval(timer);
            }, [active.id, list.length]);

            // --- UI RENDER ---
            return (
                <div className="glass-panel" style={{ width: '100%', maxWidth: '420px', padding: '24px', boxSizing: 'border-box', display: 'flex', flexDirection: 'column' }}>
                    
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                        <div style={{ fontSize: '18px', fontWeight: '900', letterSpacing: '-0.5px' }}>
                            TradeSync<span style={{ color: '#00e676' }}>.Pro</span>
                        </div>
                        <div style={{ display: 'flex', gap: '6px', alignItems: 'center', background: 'rgba(0,0,0,0.5)', padding: '6px 12px', borderRadius: '20px', border: `1px solid ${marketStatus.color}40` }}>
                            <div style={{ width: '6px', height: '6px', borderRadius: '50%', background: marketStatus.color, boxShadow: `0 0 8px ${marketStatus.color}` }}></div>
                            <span style={{ fontSize: '8px', color: marketStatus.color, fontWeight: '800', letterSpacing: '1px' }}>{marketStatus.text}</span>
                        </div>
                    </div>

                    <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                        <div style={{ fontSize: '11px', color: '#888', fontWeight: '800', letterSpacing: '1px', textTransform: 'uppercase' }}>
                            {active.name} / USD
                        </div>
                        <div className="number-font" style={{ fontSize: '48px', fontWeight: '800', margin: '4px 0', letterSpacing: '-2px' }}>
                            ${prices[active.id] ? prices[active.id].c.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '---'}
                        </div>
                        <div className="number-font" style={{ fontSize: '12px', fontWeight: '800', color: prices[active.id] && prices[active.id].dp >= 0 ? '#00e676' : '#ff3d00' }}>
                            {prices[active.id] ? `${prices[active.id].dp > 0 ? '+' : ''}${prices[active.id].dp.toFixed(2)}% (24H)` : '0.00%'}
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '8px', marginBottom: '20px' }}>
                        {Object.entries(signals).map(([k, v]) => {
                            const isBuy = v.includes('BUY') || v.includes('LONG') || v.includes('BULLISH') || v.includes('UPTREND');
                            const isSell = v.includes('SELL') || v.includes('SHORT') || v.includes('BEARISH') || v.includes('DOWNTREND');
                            return (
                                <div key={k} style={{ 
                                    background: isBuy ? 'rgba(0, 230, 118, 0.1)' : isSell ? 'rgba(255, 61, 0, 0.1)' : 'rgba(255, 255, 255, 0.05)', 
                                    border: `1px solid ${isBuy ? 'rgba(0, 230, 118, 0.3)' : isSell ? 'rgba(255, 61, 0, 0.3)' : 'rgba(255, 255, 255, 0.1)'}`,
                                    padding: '10px 4px', borderRadius: '12px', textAlign: 'center', transition: '0.3s'
                                }}>
                                    <div style={{ fontSize: '8px', color: '#888', marginBottom: '4px', fontWeight: '800', textTransform: 'uppercase', letterSpacing: '1px' }}>{k}</div>
                                    <div className={isBuy ? 'neon-text-green' : isSell ? 'neon-text-red' : ''} style={{ fontSize: '9px', fontWeight: '900' }}>{v}</div>
                                </div>
                            )
                        })}
                    </div>

                    <div style={{ marginBottom: '20px' }}>
                        <div style={{ fontSize: '9px', color: '#666', fontWeight: '800', marginBottom: '8px', letterSpacing: '1px' }}>LATEST {active.id} NEWS</div>
                        {newsFeed.length > 0 ? newsFeed.map((news, idx) => (
                            <a key={idx} href={news.url || '#'} target="_blank" style={{ textDecoration: 'none', color: 'inherit' }}>
                                <div style={{ background: 'rgba(0,0,0,0.3)', borderLeft: '2px solid #333', padding: '10px 12px', borderRadius: '0 8px 8px 0', marginBottom: '6px' }}>
                                    <div style={{ fontSize: '11px', fontWeight: '600', lineHeight: '1.4', overflow: 'hidden', whiteSpace: 'nowrap', textOverflow: 'ellipsis' }}>{news.headline}</div>
                                    <div style={{ fontSize: '8px', color: '#888', marginTop: '4px', textTransform: 'uppercase' }}>{news.source || 'Market Feed'}</div>
                                </div>
                            </a>
                        )) : (
                            <div style={{ fontSize: '10px', color: '#555', fontStyle: 'italic' }}>Fetching latest headlines...</div>
                        )}
                    </div>

                    <div style={{ height: '180px', width: '100%', marginBottom: '20px', borderRadius: '16px', overflow: 'hidden', border: '1px solid rgba(255, 255, 255, 0.08)' }}>
                        <iframe src={`https://s.tradingview.com/widgetembed/?symbol=${active.tv}&interval=15&hidesidetoolbar=1&symboledit=0&saveimage=0&toolbarbg=000000&studies=[]&theme=dark&style=3`} style={{ width: '100%', height: '100%', border: 'none' }} />
                    </div>

                    <div style={{ fontSize: '9px', color: '#666', fontWeight: '800', marginBottom: '8px', letterSpacing: '1px' }}>WATCHLIST</div>
                    <div style={{ maxHeight: '140px', overflowY: 'auto', paddingRight: '4px', marginBottom: '16px' }}>
                        {list.map(item => (
                            <div key={item.id} className={`watchlist-item ${active.id === item.id ? 'active-item' : ''}`} onClick={() => setActive(item)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', background: 'rgba(0, 0, 0, 0.4)', borderRadius: '12px', marginBottom: '6px', cursor: 'pointer' }}>
                                <div style={{ display: 'flex', flexDirection: 'column' }}>
                                    <span style={{ fontSize: '13px', fontWeight: '800' }}>{item.id}</span>
                                    <span style={{ fontSize: '9px', color: '#666', fontWeight: '600' }}>{item.name}</span>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end' }}>
                                    <span className="number-font" style={{ fontSize: '13px', color: prices[item.id] ? '#fff' : '#444', fontWeight: '700' }}>
                                        {prices[item.id] ? `$${prices[item.id].c.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}` : '---'}
                                    </span>
                                    {prices[item.id] && (
                                        <span className="number-font" style={{ fontSize: '9px', color: prices[item.id].dp >= 0 ? '#00e676' : '#ff3d00' }}>
                                            {prices[item.id].dp > 0 ? '+' : ''}{prices[item.id].dp.toFixed(2)}%
                                        </span>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div style={{ display: 'flex', gap: '8px' }}>
                        <input value={newTicker} onChange={(e) => setNewTicker(e.target.value)} placeholder="Add ticker (e.g. AAPL)" style={{ flex: 1, background: 'rgba(0, 0, 0, 0.5)', color: '#fff', border: '1px solid rgba(255,255,255,0.1)', padding: '12px', borderRadius: '12px', outline: 'none', fontSize: '12px', fontWeight: '600' }} />
                        <button onClick={() => { if(newTicker) { setList([...list, { id: newTicker.toUpperCase(), name: newTicker.toUpperCase(), tag: newTicker.toUpperCase(), tv: newTicker.toUpperCase(), type: 'F', search: newTicker.toUpperCase(), market: 'USER ADDED' }]); setNewTicker(''); }}} style={{ background: '#fff', border: 'none', padding: '0 20px', borderRadius: '12px', fontWeight: '900', cursor: 'pointer', color: '#000', fontSize: '16px' }}>+</button>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
