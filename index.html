<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            const [input, setInput] = useState('XAUUSD');
            const [symbol, setSymbol] = useState('OANDA:XAU_USD');
            const [price, setPrice] = useState(null);
            const [status, setStatus] = useState('READY');
            const [signals, setSignals] = useState({ scalping: '...', day: '...', swing: '...' });
            
            const API_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            const fetchData = async (targetSymbol) => {
                setStatus('SCANNING ' + targetSymbol + '...');
                try {
                    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${targetSymbol}&token=${API_KEY}`);
                    const data = await res.json();
                    
                    if (data && data.c && data.c !== 0) {
                        setPrice(data.c);
                        setSymbol(targetSymbol);
                        setStatus('LIVE');
                        
                        // Generate AI Advice based on Price Action
                        const change = ((data.c - data.pc) / data.pc) * 100;
                        setSignals({
                            scalping: change > 0.1 ? 'BUY MOMENTUM' : change < -0.1 ? 'SELL MOMENTUM' : 'WAIT',
                            day: Math.abs(change) > 0.2 ? (change > 0 ? 'BULLISH BIAS' : 'BEARISH BIAS') : 'CONSOLIDATING',
                            swing: Math.abs(change) > 0.5 ? 'TREND ACTIVE' : 'NO MACRO SIGNAL'
                        });
                        return true;
                    }
                    return false;
                } catch (err) {
                    return false;
                }
            };

            const handleSearch = async () => {
                const s = input.toUpperCase().trim();
                let success = false;

                // Try 1: OANDA Prefix (Best for Metals)
                if (s === 'XAUUSD' || s === 'GOLD') success = await fetchData('OANDA:XAU_USD');
                if (!success && (s === 'XAGUSD' || s === 'SILVER')) success = await fetchData('OANDA:XAG_USD');

                // Try 2: FX Prefix (Best for Forex)
                if (!success && s.length === 6) success = await fetchData(`FX:${s.slice(0,3)}_${s.slice(3)}`);

                // Try 3: Raw Symbol (Best for Stocks/Indices)
                if (!success) success = await fetchData(s);

                if (!success) setStatus('SYMBOL NOT FOUND');
            };

            useEffect(() => { handleSearch(); }, []);

            return (
                <div style={{ padding: '30px', background: '#0a0a0a', borderRadius: '30px', border: '1px solid #222', width: '320px', textAlign: 'center', boxShadow: '0 20px 50px rgba(0,0,0,0.5)' }}>
                    <div style={{ fontSize: '10px', color: '#555', marginBottom: '10px', letterSpacing: '2px' }}>TRADESYNC TERMINAL</div>
                    
                    <input 
                        value={input} 
                        onChange={(e) => setInput(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                        style={{ background: '#000', color: '#3b82f6', border: '1px solid #333', width: '100%', padding: '15px', borderRadius: '15px', boxSizing: 'border-box', textAlign: 'center', fontSize: '18px', fontWeight: 'bold', outline: 'none', marginBottom: '10px' }}
                        placeholder="XAUUSD"
                    />

                    <div style={{ margin: '20px 0' }}>
                        <div style={{ fontSize: '45px', fontWeight: '900', color: '#fff', letterSpacing: '-2px' }}>
                            {price ? `$${price.toFixed(2)}` : '---'}
                        </div>
                        <div style={{ fontSize: '10px', color: status === 'LIVE' ? '#22c55e' : '#f59e0b', marginTop: '5px' }}>
                            {status}
                        </div>
                    </div>

                    <div style={{ textAlign: 'left', marginTop: '30px' }}>
                        {Object.entries(signals).map(([key, val]) => (
                            <div key={key} style={{ background: '#111', padding: '12px', borderRadius: '12px', marginBottom: '10px', border: '1px solid #1a1a1a' }}>
                                <div style={{ fontSize: '8px', color: '#444', fontWeight: 'bold', marginBottom: '4px' }}>{key.toUpperCase()}</div>
                                <div style={{ fontSize: '12px', fontWeight: 'bold', color: val.includes('BUY') || val.includes('BULL') ? '#22c55e' : val.includes('SELL') || val.includes('BEAR') ? '#ef4444' : '#666' }}>
                                    {val}
                                </div>
                            </div>
                        ))}
                    </div>

                    <button onClick={handleSearch} style={{ width: '100%', padding: '12px', background: '#222', border: 'none', borderRadius: '12px', color: '#fff', fontSize: '10px', cursor: 'pointer', marginTop: '10px', fontWeight: 'bold' }}>
                        RE-SCAN MARKET
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
