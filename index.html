<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background-color: #050505; color: #fff; margin: 0; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            const [input, setInput] = useState('XAUUSD');
            const [price, setPrice] = useState(null);
            const [status, setStatus] = useState('STANDBY');
            const [signals, setSignals] = useState({ scalping: '...', day: '...', swing: '...' });
            
            // Using a demo-capable public endpoint for Forex/Metals to bypass Finnhub limits
            const fetchGlobalData = async (sym) => {
                setStatus('SCANNING ' + sym + '...');
                try {
                    // Normalize symbol for Forex/Gold
                    let apiSym = sym.toUpperCase().trim();
                    if (apiSym === 'XAUUSD' || apiSym === 'GOLD') apiSym = 'XAU';
                    if (apiSym === 'XAGUSD' || apiSym === 'SILVER') apiSym = 'XAG';

                    // Fetching from a secondary Public Market API (Crypto/FX/Metals focus)
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${apiSym}USDT`);
                    const data = await res.json();
                    
                    if (data && data.price) {
                        const val = parseFloat(data.price);
                        setPrice(val);
                        setStatus('LIVE (BINANCE FEED)');
                        
                        // Signal Generation
                        setSignals({
                            scalping: 'VOLATILITY DETECTED',
                            day: val > 2000 ? 'BULLISH STRUCTURE' : 'BEARISH STRUCTURE',
                            swing: 'MONITORING TREND'
                        });
                        return true;
                    }
                    
                    // Fallback to your Finnhub Key for Stocks
                    const fRes = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=d832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20`);
                    const fData = await fRes.json();
                    if (fData.c) {
                        setPrice(fData.c);
                        setStatus('LIVE (STOCK FEED)');
                        setSignals({ scalping: 'STABLE', day: 'EQUITY BIAS', swing: 'LONG TERM' });
                        return true;
                    }

                    return false;
                } catch (err) {
                    return false;
                }
            };

            const handleSearch = async () => {
                const ok = await fetchGlobalData(input);
                if (!ok) setStatus('INVALID SYMBOL');
            };

            useEffect(() => { handleSearch(); }, []);

            return (
                <div style={{ padding: '30px', background: '#0f0f0f', borderRadius: '30px', border: '1px solid #222', width: '320px', textAlign: 'center' }}>
                    <div style={{ fontSize: '9px', color: '#444', marginBottom: '15px', letterSpacing: '3px' }}>AI TRADING TERMINAL</div>
                    
                    <input 
                        value={input} 
                        onChange={(e) => setInput(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                        style={{ background: '#000', color: '#00ff88', border: '1px solid #333', width: '100%', padding: '15px', borderRadius: '12px', boxSizing: 'border-box', textAlign: 'center', fontSize: '18px', fontWeight: 'bold', outline: 'none' }}
                        placeholder="e.g. BTC, XAU, ETH"
                    />

                    <div style={{ margin: '25px 0' }}>
                        <div style={{ fontSize: '40px', fontStyle: 'italic', fontWeight: '900', color: '#fff' }}>
                            {price ? price.toFixed(2) : '---'}
                        </div>
                        <div style={{ fontSize: '9px', color: status.includes('LIVE') ? '#00ff88' : '#ff4444', marginTop: '8px' }}>
                            {status}
                        </div>
                    </div>

                    <div style={{ textAlign: 'left', marginTop: '20px' }}>
                        {Object.entries(signals).map(([key, val]) => (
                            <div key={key} style={{ background: '#000', padding: '12px', borderRadius: '10px', marginBottom: '8px', border: '1px solid #1a1a1a' }}>
                                <div style={{ fontSize: '7px', color: '#444', fontWeight: 'bold', marginBottom: '3px' }}>{key.toUpperCase()}</div>
                                <div style={{ fontSize: '11px', color: '#00ff88', fontWeight: 'bold' }}>{val}</div>
                            </div>
                        ))}
                    </div>

                    <button onClick={handleSearch} style={{ width: '100%', padding: '12px', background: '#00ff88', border: 'none', borderRadius: '10px', color: '#000', fontSize: '10px', cursor: 'pointer', marginTop: '10px', fontWeight: '900' }}>
                        SCAN NOW
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
