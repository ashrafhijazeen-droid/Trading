<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: monospace; display: flex; justify-content: center; padding: 20px;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function TradeSyncPro() {
            const [input, setInput] = useState('XAU');
            const [mainAsset, setMainAsset] = useState({ symbol: 'XAU', price: 0, prev: 0 });
            const [watchlist, setWatchlist] = useState([
                { id: 'XAU', name: 'GOLD', price: 0 },
                { id: 'XAG', name: 'SILVER', price: 0 },
                { id: 'EUR', name: 'EURUSD', price: 0 },
                { id: 'TSLA', name: 'TESLA', price: 0 },
                { id: 'BTC', name: 'BITCOIN', price: 0 }
            ]);
            const [signals, setSignals] = useState({ scalping: 'NEUTRAL', day: 'NEUTRAL', swing: 'NEUTRAL' });
            
            const API_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            // Helper to fetch from Binance or Finnhub
            const getPrice = async (sym) => {
                try {
                    let binanceSym = sym === 'XAU' ? 'PAXGUSDT' : sym === 'XAG' ? 'XAGUSDT' : sym === 'EUR' ? 'EURUSDT' : sym + 'USDT';
                    const bRes = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${binanceSym}`);
                    const bData = await bRes.json();
                    if (bData.price) return parseFloat(bData.price);

                    const fRes = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${API_KEY}`);
                    const fData = await fRes.json();
                    return fData.c || 0;
                } catch (e) { return 0; }
            };

            const updateDashboard = async () => {
                // Update Main Search
                const newPrice = await getPrice(mainAsset.symbol);
                if (newPrice > 0) {
                    const diff = newPrice - mainAsset.prev;
                    setMainAsset(prev => ({ ...prev, price: newPrice, prev: newPrice }));
                    
                    // Logic for recommendations
                    setSignals({
                        scalping: diff > 0.01 ? 'BUY SCALP' : diff < -0.01 ? 'SELL SCALP' : 'WAITing',
                        day: newPrice > mainAsset.price ? 'UPTREND' : 'DOWNTREND',
                        swing: 'HOLDING POSITION'
                    });
                }

                // Update Watchlist
                const updatedWatch = await Promise.all(watchlist.map(async (item) => {
                    const p = await getPrice(item.id);
                    return { ...item, price: p };
                }));
                setWatchlist(updatedWatch);
            };

            useEffect(() => {
                updateDashboard();
                const timer = setInterval(updateDashboard, 15000); // 15s updates
                return () => clearInterval(timer);
            }, [mainAsset.symbol]);

            const handleSearch = (e) => {
                if (e.key === 'Enter') {
                    setMainAsset({ symbol: input.toUpperCase(), price: 0, prev: 0 });
                }
            };

            return (
                <div style={{ width: '350px', background: '#0a0a0a', padding: '25px', borderRadius: '30px', border: '1px solid #222' }}>
                    <div style={{ fontSize: '10px', color: '#444', marginBottom: '15px', textAlign: 'center' }}>AI TRADING ENGINE</div>
                    
                    <input 
                        value={input} 
                        onChange={(e) => setInput(e.target.value)}
                        onKeyDown={handleSearch}
                        style={{ background: '#000', color: '#00ff88', border: '1px solid #333', width: '100%', padding: '12px', borderRadius: '12px', boxSizing: 'border-box', textAlign: 'center', fontWeight: 'bold', outline: 'none' }}
                        placeholder="SEARCH (XAU, BTC, EUR)"
                    />

                    <div style={{ margin: '20px 0', textAlign: 'center' }}>
                        <div style={{ fontSize: '45px', fontWeight: '900' }}>${mainAsset.price.toLocaleString()}</div>
                        <div style={{ fontSize: '9px', color: '#00ff88' }}>{mainAsset.symbol} LIVE SIGNAL</div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '5px', marginBottom: '20px' }}>
                        {Object.entries(signals).map(([k, v]) => (
                            <div key={k} style={{ background: '#111', padding: '8px', borderRadius: '8px', textAlign: 'center', border: '1px solid #222' }}>
                                <div style={{ fontSize: '7px', color: '#555' }}>{k}</div>
                                <div style={{ fontSize: '9px', fontWeight: 'bold', color: v.includes('BUY') ? '#00ff88' : v.includes('SELL') ? '#ff4444' : '#fff' }}>{v}</div>
                            </div>
                        ))}
                    </div>

                    <div style={{ borderTop: '1px solid #222', paddingTop: '15px' }}>
                        <div style={{ fontSize: '9px', color: '#444', marginBottom: '10px' }}>ASSET WATCHLIST</div>
                        {watchlist.map(item => (
                            <div key={item.id} onClick={() => {setMainAsset({symbol: item.id, price:0, prev:0}); setInput(item.id);}} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px', background: '#000', border: '1px solid #111', borderRadius: '8px', marginBottom: '5px', cursor: 'pointer' }}>
                                <span style={{ fontSize: '11px', fontWeight: 'bold' }}>{item.name}</span>
                                <span style={{ fontSize: '11px', color: '#00ff88' }}>${item.price.toLocaleString()}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
