<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: monospace; display: flex; justify-content: center; padding: 20px;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            const [mainAsset, setMainAsset] = useState({ symbol: 'XAU', price: 0, lastPrice: 0 });
            const [newTicker, setNewTicker] = useState('');
            const [watchlist, setWatchlist] = useState([
                { id: 'XAU', name: 'GOLD', price: 0, type: 'B', tag: 'PAXGUSDT' },
                { id: 'XAG', name: 'SILVER', price: 0, type: 'B', tag: 'XAGUSDT' },
                { id: 'EUR', name: 'EUR/USD', price: 0, type: 'B', tag: 'EURUSDT' },
                { id: 'JPY', name: 'USD/JPY', price: 0, type: 'B', tag: 'USDJPY' },
                { id: 'TSLA', name: 'TESLA', price: 0, type: 'F', tag: 'TSLA' },
                { id: 'BTC', name: 'BITCOIN', price: 0, type: 'B', tag: 'BTCUSDT' }
            ]);
            const [signals, setSignals] = useState({ scalping: 'STABLE', day: 'NEUTRAL', swing: 'NEUTRAL' });
            
            const FIN_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            const fetchPrice = async (item) => {
                try {
                    if (item.type === 'B') {
                        const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${item.tag}`);
                        const d = await r.json();
                        return parseFloat(d.price) || 0;
                    } else {
                        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${item.tag}&token=${FIN_KEY}`);
                        const d = await r.json();
                        return d.c || 0;
                    }
                } catch (e) { return 0; }
            };

            const addAsset = () => {
                if (!newTicker) return;
                const upper = newTicker.toUpperCase().trim();
                const isForex = upper.length === 6;
                const newItem = {
                    id: upper,
                    name: upper,
                    price: 0,
                    type: isForex ? 'B' : 'F',
                    tag: isForex ? upper + 'USDT' : upper
                };
                setWatchlist([...watchlist, newItem]);
                setNewTicker('');
            };

            const updateLoop = async () => {
                const nextWatch = await Promise.all(watchlist.map(async (item) => {
                    const p = await fetchPrice(item);
                    return { ...item, price: p };
                }));
                setWatchlist(nextWatch);

                const current = nextWatch.find(x => x.id === mainAsset.symbol);
                if (current && current.price > 0) {
                    const diff = current.price - mainAsset.lastPrice;
                    setSignals({
                        scalping: diff > 0 ? 'BULLISH VOL' : diff < 0 ? 'BEARISH VOL' : 'WAITING',
                        day: diff > (current.price * 0.0001) ? 'STRONG BUY' : diff < -(current.price * 0.0001) ? 'STRONG SELL' : 'NEUTRAL',
                        swing: 'MONITORING'
                    });
                    setMainAsset(prev => ({ ...prev, price: current.price, lastPrice: current.price }));
                }
            };

            useEffect(() => {
                updateLoop();
                const timer = setInterval(updateLoop, 10000);
                return () => clearInterval(timer);
            }, [mainAsset.symbol, watchlist.length]);

            return (
                <div style={{ width: '360px', background: '#0a0a0a', padding: '20px', borderRadius: '25px', border: '1px solid #1a1a1a' }}>
                    <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                        <div style={{ fontSize: '10px', color: '#00ff88', fontWeight: 'bold' }}>{mainAsset.symbol} ANALYSIS</div>
                        <div style={{ fontSize: '42px', fontWeight: '900' }}>
                            ${mainAsset.price > 0 ? mainAsset.price.toLocaleString(undefined, {minimumFractionDigits: 2}) : '---'}
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '8px', marginBottom: '20px' }}>
                        {Object.entries(signals).map(([k, v]) => (
                            <div key={k} style={{ background: '#111', padding: '10px 5px', borderRadius: '10px', textAlign: 'center', border: '1px solid #222' }}>
                                <div style={{ fontSize: '7px', color: '#555', marginBottom: '4px' }}>{k.toUpperCase()}</div>
                                <div style={{ fontSize: '8px', fontWeight: '900', color: v.includes('BUY') || v.includes('BULL') ? '#00ff88' : v.includes('SELL') || v.includes('BEAR') ? '#ff4444' : '#666' }}>{v}</div>
                            </div>
                        ))}
                    </div>

                    <div style={{ maxHeight: '280px', overflowY: 'auto', marginBottom: '15px' }}>
                        {watchlist.map(item => (
                            <div key={item.id} onClick={() => setMainAsset({symbol: item.id, price: 0, lastPrice: mainAsset.price})} style={{ display: 'flex', justifyContent: 'space-between', padding: '12px', background: '#000', border: '1px solid #111', borderRadius: '12px', marginBottom: '6px', cursor: 'pointer' }}>
                                <span style={{ fontSize: '11px', fontWeight: 'bold' }}>{item.name}</span>
                                <span style={{ fontSize: '11px', color: item.price > 0 ? '#00ff88' : '#444' }}>
                                    {item.price > 0 ? `$${item.price.toLocaleString()}` : 'SCANNING...'}
                                </span>
                            </div>
                        ))}
                    </div>

                    <div style={{ display: 'flex', gap: '5px' }}>
                        <input 
                            value={newTicker} 
                            onChange={(e) => setNewTicker(e.target.value)} 
                            placeholder="ADD (e.g. US30, AAPL)"
                            style={{ flex: 1, background: '#000', color: '#fff', border: '1px solid #333', padding: '10px', borderRadius: '10px', outline: 'none', fontSize: '10px' }}
                        />
                        <button onClick={addAsset} style={{ background: '#00ff88', border: 'none', padding: '10px 15px', borderRadius: '10px', fontWeight: 'bold', cursor: 'pointer' }}>+</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
