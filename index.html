<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: monospace; padding: 10px;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            const [mainAsset, setMainAsset] = useState({ id: 'XAU', symbol: 'OANDA:XAU_USD', price: 0 });
            const [newTicker, setNewTicker] = useState('');
            const [watchlist, setWatchlist] = useState([
                { id: 'XAU', name: 'GOLD', tag: 'PAXGUSDT' },
                { id: 'XAG', name: 'SILVER', tag: 'XAGUSDT' },
                { id: 'US30', name: 'DOW JONES', tag: 'US30' },
                { id: 'EURUSD', name: 'EUR/USD', tag: 'EURUSDT' },
                { id: 'USDJPY', name: 'USD/JPY', tag: 'USDJPY' },
                { id: 'TSLA', name: 'TESLA', tag: 'TSLA' }
            ]);
            const [prices, setPrices] = useState({});
            
            const FIN_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            const fetchPrice = async (item) => {
                try {
                    // Try Binance first (Forex/Metals/Indices)
                    const bRes = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${item.tag}`);
                    const bData = await bRes.json();
                    if (bData.price) return parseFloat(bData.price);

                    // Try Finnhub for Stocks
                    const fRes = await fetch(`https://finnhub.io/api/v1/quote?symbol=${item.id}&token=${FIN_KEY}`);
                    const fData = await fRes.json();
                    return fData.c || 0;
                } catch (e) { return 0; }
            };

            useEffect(() => {
                const loop = async () => {
                    const newPrices = {};
                    for (const item of watchlist) {
                        newPrices[item.id] = await fetchPrice(item);
                    }
                    setPrices(newPrices);
                };
                loop();
                const timer = setInterval(loop, 15000);
                return () => clearInterval(timer);
            }, [watchlist]);

            const addAsset = () => {
                if (!newTicker) return;
                const upper = newTicker.toUpperCase().trim();
                setWatchlist([...watchlist, { id: upper, name: upper, tag: upper + 'USDT' }]);
                setNewTicker('');
            };

            return (
                <div style={{ maxWidth: '400px', margin: '0 auto', background: '#0a0a0a', padding: '15px', borderRadius: '20px', border: '1px solid #1a1a1a' }}>
                    
                    {/* Active Asset Info */}
                    <div style={{ textAlign: 'center', marginBottom: '15px' }}>
                        <div style={{ fontSize: '10px', color: '#00ff88', fontWeight: 'bold' }}>{mainAsset.id} INTRADAY</div>
                        <div style={{ fontSize: '32px', fontWeight: '900' }}>
                            ${prices[mainAsset.id] ? prices[mainAsset.id].toLocaleString() : '---'}
                        </div>
                    </div>

                    {/* DYNAMIC CHART */}
                    <div style={{ height: '250px', width: '100%', marginBottom: '15px', borderRadius: '12px', overflow: 'hidden', border: '1px solid #222' }}>
                        <iframe 
                            src={`https://s.tradingview.com/widgetembed/?frameElementId=tradingview_76d4d&symbol=${mainAsset.id === 'XAU' ? 'OANDA:XAUUSD' : mainAsset.id === 'XAG' ? 'OANDA:XAGUSD' : mainAsset.id}&interval=15&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=[]&theme=dark&style=1&timezone=exchange`}
                            style={{ width: '100%', height: '100%', border: 'none' }}
                        />
                    </div>

                    {/* WATCHLIST */}
                    <div style={{ maxHeight: '200px', overflowY: 'auto', marginBottom: '10px' }}>
                        {watchlist.map(item => (
                            <div key={item.id} onClick={() => setMainAsset({ id: item.id, symbol: item.tag })} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px', background: '#000', border: '1px solid #111', borderRadius: '10px', marginBottom: '5px', cursor: 'pointer' }}>
                                <span style={{ fontSize: '11px', fontWeight: 'bold' }}>{item.name}</span>
                                <span style={{ fontSize: '11px', color: '#00ff88' }}>
                                    {prices[item.id] ? `$${prices[item.id].toLocaleString()}` : '...'}
                                </span>
                            </div>
                        ))}
                    </div>

                    {/* ADD TOOL */}
                    <div style={{ display: 'flex', gap: '5px' }}>
                        <input 
                            value={newTicker} 
                            onChange={(e) => setNewTicker(e.target.value)} 
                            placeholder="TICKER (e.g. BTCUSD)"
                            style={{ flex: 1, background: '#000', color: '#fff', border: '1px solid #333', padding: '10px', borderRadius: '10px', outline: 'none', fontSize: '10px' }}
                        />
                        <button onClick={addAsset} style={{ background: '#00ff88', border: 'none', padding: '10px 15px', borderRadius: '10px', fontWeight: 'bold', cursor: 'pointer' }}>+</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
