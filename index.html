<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #000; margin: 0; font-family: sans-serif;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            const [symbol, setSymbol] = useState('OANDA:XAU_USD');
            const [price, setPrice] = useState(0);
            const [signals, setSignals] = useState({ scalping: 'LOADING', day: 'LOADING', swing: 'LOADING' });
            const [marketData, setMarketData] = useState(null);
            const [sentiment, setSentiment] = useState({ score: 50, label: 'NEUTRAL' });

            const key = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            const runAnalysis = async () => {
                try {
                    // 1. Price
                    const pReq = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${key}`);
                    const pData = await pReq.req ? {} : await pReq.json();
                    if (pData.c) setPrice(pData.c);

                    // 2. News
                    const cleanSym = symbol.split(':').pop();
                    const nReq = await fetch(`https://finnhub.io/api/v1/news-sentiment?symbol=${cleanSym}&token=${key}`);
                    const nData = await nReq.json();
                    let sLabel = 'NEUTRAL';
                    if (nData.sentiment) {
                        const s = nData.sentiment.bullishPercent;
                        sLabel = s > 0.6 ? 'BULLISH' : s < 0.4 ? 'BEARISH' : 'NEUTRAL';
                        setSentiment({ score: Math.round(s * 100), label: sLabel });
                    }

                    // 3. Technicals
                    const tReq = await fetch(`https://finnhub.io/api/v1/scan/technical-indicator?symbol=${symbol}&resolution=D&token=${key}`);
                    const tData = await tReq.json();
                    const ind = tData.technicalIndicator;
                    setMarketData(ind);

                    if (ind) {
                        const buy = ind.buy;
                        const sell = ind.sell;
                        const rsi = ind.rsi;
                        
                        setSignals({
                            scalping: rsi < 35 && sLabel !== 'BEARISH' ? 'BUY (OVERSOLD)' : rsi > 65 && sLabel !== 'BULLISH' ? 'SELL (OVERBOUGHT)' : 'WAITING',
                            day: buy > sell + 2 && sLabel !== 'BEARISH' ? 'BUY (TRENDING)' : sell > buy + 2 && sLabel !== 'BULLISH' ? 'SELL (TRENDING)' : 'CONFLICT',
                            swing: buy > 10 && sLabel === 'BULLISH' ? 'STRONG LONG' : sell > 10 && sLabel === 'BEARISH' ? 'STRONG SHORT' : 'NEUTRAL'
                        });
                    }
                } catch (err) {
                    console.error("Analysis Error:", err);
                }
            };

            useEffect(() => {
                runAnalysis();
                const timer = setInterval(runAnalysis, 60000);
                return () => clearInterval(timer);
            }, [symbol]);

            return (
                <div style={{ color: '#fff', padding: '20px', maxWidth: '600px', margin: '0 auto' }}>
                    {/* Header */}
                    <div style={{ backgroundColor: '#111', padding: '20px', borderRadius: '15px', border: '1px solid #333', marginBottom: '20px' }}>
                        <input 
                            value={symbol} 
                            onChange={(e) => setSymbol(e.target.value.toUpperCase())}
                            style={{ background: 'transparent', color: '#3b82f6', border: 'none', fontSize: '20px', fontWeight: 'bold', width: '100%', outline: 'none' }}
                        />
                        <div style={{ fontSize: '40px', fontWeight: '900', marginTop: '10px' }}>
                            ${price ? price.toFixed(2) : '0.00'}
                        </div>
                    </div>

                    {/* Sentiment */}
                    <div style={{ backgroundColor: '#111', padding: '15px', borderRadius: '15px', borderLeft: '4px solid #f59e0b', marginBottom: '20px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10px', fontWeight: 'bold', color: '#f59e0b' }}>
                            <span>FUNDAMENTAL SENTIMENT</span>
                            <span style={{ color: sentiment.label === 'BULLISH' ? '#22c55e' : sentiment.label === 'BEARISH' ? '#ef4444' : '#71717a' }}>{sentiment.label}</span>
                        </div>
                        <div style={{ fontSize: '24px', fontWeight: 'bold', marginTop: '5px' }}>{sentiment.score}% BULLISH</div>
                    </div>

                    {/* Signals */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '10px' }}>
                        {Object.entries(signals).map(([name, val]) => (
                            <div key={name} style={{ backgroundColor: '#111', padding: '15px', borderRadius: '12px', border: '1px solid #222', textAlign: 'center' }}>
                                <div style={{ fontSize: '9px', color: '#555', marginBottom: '5px', textTransform: 'uppercase' }}>{name}</div>
                                <div style={{ 
                                    fontSize: '12px', 
                                    fontWeight: 'bold', 
                                    padding: '10px', 
                                    borderRadius: '8px',
                                    color: val.includes('BUY') || val.includes('LONG') ? '#22c55e' : val.includes('SELL') || val.includes('SHORT') ? '#ef4444' : '#555',
                                    border: '1px solid ' + (val.includes('BUY') || val.includes('LONG') ? '#22c55e' : val.includes('SELL') || val.includes('SHORT') ? '#ef4444' : '#222')
                                }}>
                                    {val}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Data Bar */}
                    {marketData && (
                        <div style={{ marginTop: '20px', display: 'flex', justifyContent: 'space-around', fontSize: '10px', color: '#666', textAlign: 'center' }}>
                            <div><div style={{ color: '#22c55e', fontSize: '20px', fontWeight: 'bold' }}>{marketData.buy}</div>BUY</div>
                            <div><div style={{ color: '#fff', fontSize: '20px', fontWeight: 'bold' }}>{marketData.rsi.toFixed(0)}</div>RSI</div>
                            <div><div style={{ color: '#ef4444', fontSize: '20px', fontWeight: 'bold' }}>{marketData.sell}</div>SELL</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
