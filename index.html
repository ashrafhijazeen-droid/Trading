<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: monospace; padding: 10px;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            // State for the Active Asset
            const [active, setActive] = useState({ id: 'XAU', name: 'GOLD', tv: 'OANDA:XAUUSD', tag: 'PAXGUSDT', type: 'B' });
            
            // Fixed Watchlist Definitions
            const [list, setList] = useState([
                { id: 'XAU', name: 'GOLD', tag: 'PAXGUSDT', tv: 'OANDA:XAUUSD', type: 'B' },
                { id: 'XAG', name: 'SILVER', tag: 'XAGUSDT', tv: 'OANDA:XAGUSD', type: 'B' },
                { id: 'US30', name: 'DOW 30', tag: 'DJI', tv: 'CURRENCYCOM:US30', type: 'F' },
                { id: 'EUR', name: 'EUR/USD', tag: 'EURUSDT', tv: 'FX:EURUSD', type: 'B' },
                { id: 'JPY', name: 'USD/JPY', tag: 'USDJPY', tv: 'FX:USDJPY', type: 'B' },
                { id: 'TSLA', name: 'TESLA', tag: 'TSLA', tv: 'NASDAQ:TSLA', type: 'F' }
            ]);

            const [prices, setPrices] = useState({});
            const [signals, setSignals] = useState({ scalping: 'STABLE', day: 'NEUTRAL', swing: 'MONITOR' });
            const [newTicker, setNewTicker] = useState('');
            
            const API_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            // Core Price Fetcher
            const getPrice = async (item) => {
                try {
                    if (item.type === 'B') {
                        const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${item.tag}`);
                        const d = await r.json();
                        return d.price ? parseFloat(d.price) : 0;
                    } else {
                        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${item.tag}&token=${API_KEY}`);
                        const d = await r.json();
                        return d.c ? d.c : 0;
                    }
                } catch (e) { return 0; }
            };

            const refreshAll = async () => {
                const results = {};
                for (const item of list) {
                    results[item.id] = await getPrice(item);
                }
                setPrices(results);

                // Update Recommendations for Active Asset
                const currentPrice = results[active.id];
                if (currentPrice > 0) {
                    setSignals({
                        scalping: Math.random() > 0.5 ? 'BUY SCALP' : 'SELL SCALP',
                        day: currentPrice > (prices[active.id] || 0) ? 'BULLISH' : 'BEARISH',
                        swing: 'HOLDING'
                    });
                }
            };

            useEffect(() => {
                refreshAll();
                const timer = setInterval(refreshAll, 10000);
                return () => clearInterval(timer);
            }, [active.id, list.length]);

            return (
                <div style={{ maxWidth: '400px', margin: '0 auto', background: '#0a0a0a', padding: '15px', borderRadius: '25px', border: '1px solid #1a1a1a' }}>
                    
                    {/* TOP DISPLAY */}
                    <div style={{ textAlign: 'center', marginBottom: '15px' }}>
                        <div style={{ fontSize: '10px', color: '#00ff88', fontWeight: 'bold' }}>{active.name} LIVE FEED</div>
                        <div style={{ fontSize: '36px', fontWeight: '900', margin: '5px 0' }}>
                            ${prices[active.id] ? prices[active.id].toLocaleString(undefined, {minimumFractionDigits: 2}) : '---'}
                        </div>
                    </div>

                    {/* STRATEGY SIGNALS (RESTORED) */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '8px', marginBottom: '15px' }}>
                        {Object.entries(signals).map(([k, v]) => (
                            <div key={k} style={{ background: '#111', padding: '10px 5px', borderRadius: '10px', textAlign: 'center', border: '1px solid #222' }}>
                                <div style={{ fontSize: '7px', color: '#555', marginBottom: '4px' }}>{k.toUpperCase()}</div>
                                <div style={{ fontSize: '8px', fontWeight: '900', color: v.includes('BUY') || v.includes('BULL') ? '#00ff88' : v.includes('SELL') || v.includes('BEAR') ? '#ff4444' : '#666' }}>{v}</div>
                            </div>
                        ))}
                    </div>

                    {/* CHART */}
                    <div style={{ height: '220px', width: '100%', marginBottom: '15px', borderRadius: '15px', overflow: 'hidden', border: '1px solid #222' }}>
                        <iframe 
                            src={`https://s.tradingview.com/widgetembed/?symbol=${active.tv}&interval=15&theme=dark&style=1&timezone=Asia%2FAmman`}
                            style={{ width: '100%', height: '100%', border: 'none' }}
                        />
                    </div>

                    {/* WATCHLIST WITH PRICES (RESTORED) */}
                    <div style={{ maxHeight: '180px', overflowY: 'auto', marginBottom: '15px', paddingRight: '5px' }}>
                        {list.map(item => (
                            <div key={item.id} onClick={() => setActive(item)} style={{ display: 'flex', justifyContent: 'space-between', padding: '12px', background: '#000', border: '1px solid #111', borderRadius: '12px', marginBottom: '6px', cursor: 'pointer' }}>
                                <span style={{ fontSize: '12px', fontWeight: 'bold' }}>{item.name}</span>
                                <span style={{ fontSize: '12px', color: '#00ff88', fontWeight: 'bold' }}>
                                    {prices[item.id] ? `$${prices[item.id].toLocaleString()}` : '...'}
                                </span>
                            </div>
                        ))}
                    </div>

                    {/* ADD ASSET */}
                    <div style={{ display: 'flex', gap: '5px' }}>
                        <input value={newTicker} onChange={(e) => setNewTicker(e.target.value)} placeholder="TICKER (e.g. BTCUSD)" style={{ flex: 1, background: '#000', color: '#fff', border: '1px solid #333', padding: '12px', borderRadius: '12px', outline: 'none', fontSize: '11px' }} />
                        <button onClick={() => setList([...list, { id: newTicker.toUpperCase(), name: newTicker.toUpperCase(), tag: newTicker.toUpperCase(), tv: newTicker.toUpperCase(), type: 'F' }])} style={{ background: '#00ff88', border: 'none', padding: '0 20px', borderRadius: '12px', fontWeight: 'bold', cursor: 'pointer' }}>+</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
