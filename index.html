<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync Pro Terminal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 50%);
            background-attachment: fixed;
            color: #ffffff;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .glass-panel {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .watchlist-item { transition: all 0.2s ease; border: 1px solid transparent; }
        .watchlist-item:hover { background: rgba(255, 255, 255, 0.03); transform: translateX(4px); }
        .active-item { border: 1px solid rgba(0, 230, 118, 0.3) !important; background: rgba(0, 230, 118, 0.05) !important; }

        .neon-text-green { color: #00e676; text-shadow: 0 0 10px rgba(0, 230, 118, 0.3); }
        .neon-text-red { color: #ff3d00; text-shadow: 0 0 10px rgba(255, 61, 0, 0.3); }
        .neon-text-blue { color: #00bfff; text-shadow: 0 0 10px rgba(0, 191, 255, 0.3); }
        .neon-text-amber { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        
        .number-font { font-family: 'JetBrains Mono', monospace; }
        input::placeholder { color: #555; font-family: 'Inter', sans-serif; }

        .dashboard-layout { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; }
        .header-area { order: 1; }
        .banner-area { order: 2; }
        .main-area { order: 3; display: flex; flex-direction: column; gap: 20px; }
        .left-area { order: 4; }
        .right-area { order: 5; }
        .chart-container { height: 260px; }
        .scrollable-list { max-height: 250px; overflow-y: auto; padding-right: 4px; }

        @media (min-width: 1024px) {
            .dashboard-layout {
                display: grid;
                grid-template-columns: 300px 1fr 320px;
                grid-template-areas: 
                    "header header header" 
                    "banner banner banner"
                    "left main right";
                max-width: 1400px;
                align-items: start;
            }
            .header-area { grid-area: header; order: unset; }
            .banner-area { grid-area: banner; order: unset; }
            .left-area { grid-area: left; order: unset; position: sticky; top: 20px; }
            .main-area { grid-area: main; order: unset; }
            .right-area { grid-area: right; order: unset; position: sticky; top: 20px; }
            .chart-container { height: 380px; }
            .scrollable-list { max-height: calc(100vh - 350px); }
        }

        .delete-btn {
            background: rgba(255, 61, 0, 0.1); border: 1px solid rgba(255, 61, 0, 0.3);
            color: #ff3d00; border-radius: 6px; padding: 2px 6px; font-size: 10px; cursor: pointer;
            transition: 0.2s;
        }
        .delete-btn:hover { background: #ff3d00; color: #fff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 🔑 FULLY INJECTED MASTER API KEYS
        // ==========================================
        const FINNHUB_API_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20'; 
        const FCS_API_KEY = 'sXI2YS9AQtvBPwKoU4SdMyrUBUPJCpwk'; 
        // ==========================================

        const DEFAULT_WATCHLIST = [
            { id: 'XAU', name: 'SPOT GOLD', tag: 'XAU/USD', tv: 'OANDA:XAUUSD', type: 'FCS', market: 'COMMODITIES' },
            { id: 'XAG', name: 'SPOT SILVER', tag: 'XAG/USD', tv: 'OANDA:XAGUSD', type: 'FCS', market: 'COMMODITIES' },
            { id: 'SPY', name: 'S&P 500 ETF', tag: 'SPY', tv: 'AMEX:SPY', type: 'FINNHUB', market: 'US EQUITIES' },
            { id: 'US30', name: 'DOW JONES (DIA)', tag: 'DIA', tv: 'AMEX:DIA', type: 'FINNHUB', market: 'US EQUITIES' },
            { id: 'EURUSD', name: 'EUR/USD', tag: 'EUR/USD', tv: 'FX:EURUSD', type: 'FCS', market: 'FOREX' },
            { id: 'BTC', name: 'BITCOIN', tag: 'BTCUSDT', tv: 'BINANCE:BTCUSDT', type: 'BINANCE_S', market: 'CRYPTO' }
        ];

        function WorldClock() {
            const [time, setTime] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (tz) => {
                return time.toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false });
            };

            const CityBox = ({ city, tz }) => (
                <div style={{ background: 'rgba(255,255,255,0.02)', padding: '10px 5px', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.05)', textAlign: 'center' }}>
                    <div style={{ fontSize: '8px', color: '#888', fontWeight: '800', letterSpacing: '1px', marginBottom: '4px' }}>{city}</div>
                    <div className="number-font" style={{ fontSize: '15px', color: '#fff', fontWeight: '800' }}>{formatTime(tz)}</div>
                </div>
            );

            return (
                <div style={{ marginBottom: '20px', paddingBottom: '20px', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                    <div style={{ fontSize: '11px', color: '#888', fontWeight: '800', marginBottom: '12px', letterSpacing: '1px' }}>GLOBAL MARKETS TIME</div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
                        <CityBox city="NEW YORK" tz="America/New_York" />
                        <CityBox city="LONDON" tz="Europe/London" />
                        <CityBox city="TOKYO" tz="Asia/Tokyo" />
                        <CityBox city="SYDNEY" tz="Australia/Sydney" />
                    </div>
                </div>
            );
        }

        function TradeSyncPro() {
            const [active, setActive] = useState(DEFAULT_WATCHLIST[0]);
            
            // MEMORY V20 - Purges the proxy lag history
            const [list, setList] = useState(() => {
                const savedList = localStorage.getItem('tradeSyncWatchlist_v20');
                if (savedList) {
                    try { return JSON.parse(savedList); } catch (e) { return DEFAULT_WATCHLIST; }
                }
                return DEFAULT_WATCHLIST;
            });

            useEffect(() => {
                localStorage.setItem('tradeSyncWatchlist_v20', JSON.stringify(list));
            }, [list]);

            const [prices, setPrices] = useState({});
            const prevPrices = useRef({}); 
            const prevSignals = useRef({ scalping: 'ANALYZING', day: 'ANALYZING', swing: 'ANALYZING' }); 
            const [signals, setSignals] = useState({ scalping: 'ANALYZING', day: 'ANALYZING', swing: 'ANALYZING' });
            
            const [analysis, setAnalysis] = useState({ 
                tech: { rsi: '...', label: 'ANALYZING', trend: '...' }, 
                fund: { score: '...', label: 'ANALYZING', buzz: '...' } 
            });

            const [tradeSetups, setTradeSetups] = useState({ 
                scalp: { type: 'WAITING', entry: '...', tp: '...', sl: '...' },
                day: { type: 'WAITING', entry: '...', tp: '...', sl: '...' },
                swing: { type: 'WAITING', entry: '...', tp: '...', sl: '...' }
            });

            const [newsFeed, setNewsFeed] = useState([]);
            const [marketStatus, setMarketStatus] = useState({ text: 'CHECKING...', color: '#f59e0b' });
            const [sessionBanner, setSessionBanner] = useState({ open: 'CHECKING...', next: '...', time: '...' });
            const [newTicker, setNewTicker] = useState('');

            // ==========================================
            // 🌐 NATIVE WEBSOCKET ENGINE (FCS API)
            // ==========================================
            useEffect(() => {
                let ws;
                try {
                    ws = new WebSocket(`wss://fcsapi.com/v3/ws?key=${FCS_API_KEY}`);
                    
                    ws.onopen = () => {
                        console.log("FCS WebSocket Connected Successfully");
                        // Subscribe to all FCS symbols currently in our list
                        const fcsTags = list.filter(i => i.type === 'FCS').map(i => i.tag);
                        if(fcsTags.length > 0) {
                            ws.send(JSON.stringify({ action: "subscribe", symbol: fcsTags.join(',') }));
                        }
                    };

                    ws.onmessage = (event) => {
                        try {
                            const response = JSON.parse(event.data);
                            // Log raw WS data to the console to see what FCS is sending
                            console.log("WS Data Received:", response); 
                            
                            const symbol = response.s || response.symbol;
                            const currentPrice = parseFloat(response.c || response.price || response.p);
                            const rawPct = response.cp || response.chg_per || "0";
                            const pct = parseFloat(String(rawPct).replace(/[^0-9.-]/g, ''));

                            if (symbol && currentPrice) {
                                const matchedItem = list.find(i => i.tag === symbol);
                                if (matchedItem) {
                                    setPrices(prev => ({
                                        ...prev,
                                        [matchedItem.id]: { c: currentPrice, dp: pct }
                                    }));
                                }
                            }
                        } catch(err) {
                            console.error("WS Parsing Error:", err);
                        }
                    };

                    ws.onerror = (err) => console.error("FCS WebSocket Connection Error:", err);

                } catch (err) {
                    console.error("Could not establish WebSocket:", err);
                }

                // Cleanup tunnel when component unmounts
                return () => {
                    if (ws) ws.close();
                };
            }, [list]); 
            // ==========================================

            const updateGlobalSessions = () => {
                const now = new Date();
                const utcHour = now.getUTCHours();
                const day = now.getUTCDay();

                const isWeekend = (day === 6) || (day === 5 && utcHour >= 22) || (day === 0 && utcHour < 22);

                if (isWeekend) {
                    const nextOpen = new Date();
                    const daysToAdd = day === 5 ? 2 : day === 6 ? 1 : 0;
                    nextOpen.setUTCDate(nextOpen.getUTCDate() + daysToAdd);
                    nextOpen.setUTCHours(22, 0, 0, 0);
                    
                    setSessionBanner({
                        open: 'WEEKEND',
                        next: 'SYDNEY',
                        time: nextOpen.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                    });
                    return;
                }

                const sessions = [
                    { name: 'SYDNEY', open: 22, close: 7 },
                    { name: 'TOKYO', open: 0, close: 9 },
                    { name: 'LONDON', open: 8, close: 17 },
                    { name: 'NEW YORK', open: 13, close: 22 }
                ];

                let openMarkets = [];
                let nextMarket = null;
                let shortestTime = 25;

                sessions.forEach(m => {
                    const isOpen = (m.open > m.close) 
                        ? (utcHour >= m.open || utcHour < m.close) 
                        : (utcHour >= m.open && utcHour < m.close);
                    
                    if (isOpen) openMarkets.push(m.name);

                    let wait = m.open - utcHour;
                    if (wait <= 0) wait += 24; 
                    
                    if (wait < shortestTime) {
                        shortestTime = wait;
                        nextMarket = m;
                    }
                });

                const nextDate = new Date();
                nextDate.setUTCHours(nextMarket.open, 0, 0, 0);
                if (nextDate <= now) nextDate.setDate(nextDate.getDate() + 1);

                setSessionBanner({
                    open: openMarkets.length > 0 ? openMarkets.join(' & ') : 'MARKETS CLOSED',
                    next: nextMarket.name,
                    time: nextDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
            };

            const getMarketData = async (item) => {
                try {
                    // DIRECT REST FALLBACK (If WebSocket fails, it calls direct without the proxy)
                    if (item.type === 'FCS') {
                        if (!FCS_API_KEY) return null; 
                        
                        const r = await fetch(`https://fcsapi.com/api-v3/forex/latest?symbol=${item.tag}&access_key=${FCS_API_KEY}`);
                        if (!r.ok) return null;
                        const d = await r.json();
                        
                        if (d.status && d.response && d.response.length > 0) {
                            const data = d.response[0];
                            const currentPrice = parseFloat(data.price || data.c || 0);
                            const rawPct = data.cp || data.chg_per || "0";
                            const pct = parseFloat(String(rawPct).replace(/[^0-9.-]/g, ''));
                            return { c: currentPrice, dp: pct };
                        }
                        return null;
                    } 
                    else if (item.type === 'BINANCE_S') {
                        const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${item.tag}`);
                        if (!r.ok) return null;
                        const d = await r.json();
                        return { c: parseFloat(d.lastPrice), dp: parseFloat(d.priceChangePercent) };
                    }
                    else if (item.type === 'FINNHUB') {
                        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${item.tag}&token=${FINNHUB_API_KEY}`);
                        if (!r.ok) return null;
                        const d = await r.json();
                        return d.c && d.c !== 0 ? { c: d.c, dp: d.dp || 0 } : null;
                    }
                } catch (e) { 
                    console.error(`REST Fetch Failed for ${item.id}:`, e);
                    return null; 
                }
            };

            const getNews = async (symbolData) => {
                try {
                    let endpoint = `https://finnhub.io/api/v1/news?category=general&token=${FINNHUB_API_KEY}`;
                    if (symbolData.type === 'FINNHUB' && symbolData.id !== 'SPY') {
                        const today = new Date().toISOString().split('T')[0];
                        const lastWeek = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                        endpoint = `https://finnhub.io/api/v1/company-news?symbol=${symbolData.tag}&from=${lastWeek}&to=${today}&token=${FINNHUB_API_KEY}`;
                    }
                    const res = await fetch(endpoint);
                    const data = await res.json();
                    setNewsFeed(data.slice(0, 8)); 
                } catch (e) {
                    setNewsFeed([{ headline: 'Market Feed Active. No specific news found.', source: 'System', url: '#' }]);
                }
            };

            const checkMarketStatus = (item) => {
                const now = new Date();
                const day = now.getUTCDay();
                const hour = now.getUTCHours();
                if (item.market === 'CRYPTO') return { text: 'MARKET LIVE 24/7', color: '#00e676' };
                if (item.market === 'FOREX' || item.market === 'COMMODITIES') {
                    if (day === 6 || (day === 5 && hour >= 21) || (day === 0 && hour < 21)) return { text: 'MARKET CLOSED', color: '#ff3d00' };
                    return { text: 'MARKET LIVE', color: '#00e676' };
                }
                if (item.market === 'US EQUITIES') {
                    if (day === 0 || day === 6) return { text: 'MARKET CLOSED', color: '#ff3d00' };
                    if (hour >= 13 && hour < 21) return { text: 'MARKET OPEN', color: '#00e676' };
                    return { text: 'AFTER-HOURS', color: '#f59e0b' };
                }
                return { text: 'LIVE FEED', color: '#00e676' };
            };

            const refreshAll = async () => {
                updateGlobalSessions(); 

                // ISOLATED PROMISE LOOP: If one fails, it safely ignores it and loads the rest!
                const fetchPromises = list.map(async (item) => {
                    try {
                        const data = await getMarketData(item);
                        return { id: item.id, data };
                    } catch (err) {
                        return { id: item.id, data: null };
                    }
                });

                const results = await Promise.all(fetchPromises);
                
                const newPrices = {};
                results.forEach(res => {
                    if (res.data !== null) newPrices[res.id] = res.data;
                });

                // Safely update state without crashing
                setPrices(prev => {
                    const current = { ...prev };
                    Object.keys(newPrices).forEach(k => { current[k] = newPrices[k]; });
                    return current;
                });
            };

            // Calculate Math independently whenever Active Price changes
            useEffect(() => {
                const activeData = prices[active.id];
                const activeOld = prevPrices.current[active.id];

                if (activeData) {
                    const currentPrice = activeData.c;
                    const dailyPct = activeData.dp; 
                    
                    let currentScalp = prevSignals.current.scalping; 
                    if (activeOld && currentPrice > activeOld.c) {
                        currentScalp = 'BUY TICK'; 
                    } else if (activeOld && currentPrice < activeOld.c) {
                        currentScalp = 'SELL TICK'; 
                    } else if (currentScalp === 'ANALYZING' || currentScalp.includes('WAITING') || !activeOld) {
                        currentScalp = dailyPct > 0 ? 'MICRO UPTREND' : 'MICRO DOWNTREND';
                    }

                    const dayLogic = dailyPct > 0.5 ? 'STRONG BUY' : dailyPct < -0.5 ? 'STRONG SELL' : dailyPct > 0 ? 'BULLISH BIAS' : 'BEARISH BIAS';
                    const swingLogic = dailyPct > 1.5 ? 'HOLD LONG' : dailyPct < -1.5 ? 'HOLD SHORT' : dailyPct > 0 ? 'UPTREND' : 'DOWNTREND';

                    const newGeneratedSignals = { scalping: currentScalp, day: dayLogic, swing: swingLogic };
                    setSignals(newGeneratedSignals);
                    prevSignals.current = newGeneratedSignals; 

                    const rsiCalc = Math.min(Math.max(50 + (dailyPct * 12), 15), 85).toFixed(1);
                    const techLabel = dayLogic; 
                    const techTrend = dailyPct >= 0 ? 'UPWARD' : 'DOWNWARD';
                    
                    const fundScore = Math.min(Math.max(50 + (dailyPct * 15), 10), 90).toFixed(0);
                    const fundLabel = Math.abs(dailyPct) < 0.1 ? 'MIXED' : dailyPct > 0 ? 'BULLISH' : 'BEARISH';
                    const buzzLevel = Math.abs(dailyPct) > 1.5 ? 'EXTREME' : Math.abs(dailyPct) > 0.5 ? 'HIGH' : 'AVERAGE';

                    setAnalysis({
                        tech: { rsi: rsiCalc, label: techLabel, trend: techTrend },
                        fund: { score: fundScore, label: fundLabel, buzz: buzzLevel }
                    });

                    const safeDailyPct = isNaN(dailyPct) ? 0 : dailyPct;
                    let assetBaseVol = 0.01; 
                    if (active.market === 'FOREX') assetBaseVol = 0.003; 
                    else if (active.market === 'COMMODITIES') assetBaseVol = 0.01; 
                    else if (active.market === 'US EQUITIES') assetBaseVol = 0.015; 
                    else if (active.market === 'CRYPTO') assetBaseVol = 0.04; 

                    const baseVolatility = Math.max(Math.abs(safeDailyPct) / 100, assetBaseVol); 
                    
                    let scalpDir = 1;
                    if (currentScalp.includes('SELL') || currentScalp.includes('DOWN')) scalpDir = -1;
                    else if (currentScalp.includes('BUY') || currentScalp.includes('UP')) scalpDir = 1;
                    else scalpDir = safeDailyPct >= 0 ? 1 : -1;

                    const dayDir = (dayLogic.includes('SELL') || dayLogic.includes('BEAR')) ? -1 : 1;
                    const swingDir = (swingLogic.includes('SHORT') || swingLogic.includes('DOWN')) ? -1 : 1;

                    const generateSetup = (dir, volMult, rewardRatio) => {
                        const riskAmount = baseVolatility * volMult;
                        const rewardAmount = riskAmount * rewardRatio;
                        const entryPrice = currentPrice;
                        
                        if (dir === 1) { 
                            return {
                                type: 'LONG',
                                entry: entryPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 5}),
                                tp: (entryPrice * (1 + rewardAmount)).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 5}),
                                sl: (entryPrice * (1 - riskAmount)).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 5})
                            };
                        } else { 
                            return {
                                type: 'SHORT',
                                entry: entryPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 5}),
                                tp: (entryPrice * (1 - rewardAmount)).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 5}),
                                sl: (entryPrice * (1 + riskAmount)).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 5})
                            };
                        }
                    };

                    setTradeSetups({
                        scalp: generateSetup(scalpDir, 0.15, 1.5),
                        day: generateSetup(dayDir, 0.50, 2.0),
                        swing: generateSetup(swingDir, 1.50, 3.0)
                    });
                }
                
                prevPrices.current[active.id] = activeData;
            }, [prices, active.id]);

            useEffect(() => {
                getNews(active);
                setMarketStatus(checkMarketStatus(active));
                refreshAll();
            }, [active.id]); 

            // REST fallback interval polling
            useEffect(() => {
                const timer = setInterval(() => {
                    refreshAll();
                    setMarketStatus(checkMarketStatus(active));
                }, 60000); 
                return () => clearInterval(timer);
            }, [active.id, list.length]);

            const handleAddTicker = () => {
                if(newTicker) { 
                    const rawTicker = newTicker.toUpperCase().trim();
                    
                    let apiType = 'FINNHUB';
                    let fetchTag = rawTicker;
                    let tvTag = rawTicker;
                    let marketType = 'US EQUITIES';
                    let displayName = rawTicker;

                    if (rawTicker === 'US30' || rawTicker === 'DOW') {
                        apiType = 'FINNHUB';
                        fetchTag = 'DIA';
                        tvTag = 'AMEX:DIA'; 
                        displayName = 'US30 (DIA)';
                    }
                    else if (rawTicker === 'XAG' || rawTicker === 'XAGUSD' || rawTicker === 'SILVER') {
                        apiType = 'FCS';
                        fetchTag = 'XAG/USD';
                        tvTag = 'OANDA:XAGUSD'; 
                        marketType = 'COMMODITIES';
                        displayName = 'XAG';
                    }
                    else if (rawTicker === 'XAU' || rawTicker === 'XAUUSD' || rawTicker === 'GOLD') {
                        apiType = 'FCS';
                        fetchTag = 'XAU/USD';
                        tvTag = 'OANDA:XAUUSD'; 
                        marketType = 'COMMODITIES';
                        displayName = 'XAU';
                    }
                    else if (rawTicker.endsWith('USD') && rawTicker.length === 6) {
                        apiType = 'FCS';
                        fetchTag = `${rawTicker.substring(0,3)}/${rawTicker.substring(3,6)}`; 
                        tvTag = `FX:${rawTicker}`; 
                        marketType = 'FOREX';
                        displayName = rawTicker;
                    } 
                    else if (rawTicker === 'BTC' || rawTicker === 'ETH' || rawTicker.endsWith('USDT')) {
                        const cleanCrypto = rawTicker.replace('USDT', '');
                        apiType = 'BINANCE_S';
                        fetchTag = `${cleanCrypto}USDT`;
                        tvTag = `BINANCE:${cleanCrypto}USDT`; 
                        marketType = 'CRYPTO';
                        displayName = cleanCrypto;
                    }

                    if (!list.find(item => item.id === displayName)) {
                        const newItem = { 
                            id: displayName, 
                            name: displayName, 
                            tag: fetchTag, 
                            tv: tvTag, 
                            type: apiType, 
                            market: marketType 
                        };
                        setList([...list, newItem]); 
                    }
                    setNewTicker(''); 
                }
            };

            const handleRemoveTicker = (e, idToRemove) => {
                e.stopPropagation(); 
                const newList = list.filter(item => item.id !== idToRemove);
                setList(newList);
                if (active.id === idToRemove && newList.length > 0) setActive(newList[0]);
            };

            return (
                <div className="dashboard-layout">
                    
                    <div className="glass-panel header-area" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '15px 25px' }}>
                        <div style={{ fontSize: '20px', fontWeight: '900', letterSpacing: '-0.5px' }}>
                            TradeSync<span style={{ color: '#00e676' }}>.Pro</span>
                        </div>
