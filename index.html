<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="background-color: #000; color: #fff; margin: 0; font-family: monospace;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TradeSyncPro() {
            const [input, setInput] = useState('OANDA:XAU_USD');
            const [symbol, setSymbol] = useState('OANDA:XAU_USD');
            const [price, setPrice] = useState(null);
            const [signals, setSignals] = useState({ scalping: '...', day: '...', swing: '...' });
            const [sentiment, setSentiment] = useState({ score: 50, label: 'NEUTRAL' });

            const API_KEY = 'd832b0pr01ql4ong0i1gd832b0pr01ql4ong0i20';

            const handleKey = (e) => {
                if (e.key === 'Enter') {
                    let s = input.toUpperCase().trim();
                    if (s === 'GOLD') s = 'OANDA:XAU_USD';
                    if (s.length === 6 && !s.includes(':')) s = `FX:${s.slice(0,3)}_${s.slice(3)}`;
                    setSymbol(s);
                    setPrice(null);
                }
            };

            const getData = async () => {
                try {
                    // 1. Price
                    const pR = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`);
                    const pD = await pR.json();
                    if (pD && pD.c) setPrice(pD.c);

                    // 2. News
                    const clean = symbol.split(':').pop() || symbol;
                    const nR = await fetch(`https://finnhub.io/api/v1/news-sentiment?symbol=${clean}&token=${API_KEY}`);
                    const nD = await nR.json();
                    let lbl = 'NEUTRAL';
                    if (nD && nD.sentiment) {
                        const pct = nD.sentiment.bullishPercent || 0.5;
                        lbl = pct > 0.6 ? 'BULLISH' : pct < 0.4 ? 'BEARISH' : 'NEUTRAL';
                        setSentiment({ score: Math.round(pct * 100), label: lbl });
                    }

                    // 3. Indicators
                    const tR = await fetch(`https://finnhub.io/api/v1/scan/technical-indicator?symbol=${symbol}&resolution=D&token=${API_KEY}`);
                    const tD = await tR.json();
                    if (tD && tD.technicalIndicator) {
                        const { buy, sell, rsi } = tD.technicalIndicator;
                        setSignals({
                            scalping: rsi < 35 && lbl !== 'BEARISH' ? 'BUY (OS)' : rsi > 65 && lbl !== 'BULLISH' ? 'SELL (OB)' : 'WAIT',
                            day: buy > sell + 2 && lbl !== 'BEARISH' ? 'BUY TREND' : sell > buy + 2 && lbl !== 'BULLISH' ? 'SELL TREND' : 'WAIT',
                            swing: buy > 10 && lbl === 'BULLISH' ? 'STRONG LONG' : sell > 10 && lbl === 'BEARISH' ? 'STRONG SHORT' : 'HOLD'
                        });
                    }
                } catch (err) { console.log("Fetch Error"); }
            };

            useEffect(() => {
                getData();
                const timer = setInterval(getData, 30000);
                return () => clearInterval(timer);
            }, [symbol]);

            return (
                <div style={{ padding: '20px', maxWidth: '400px', margin: '0 auto' }}>
                    <div style={{ border: '1px solid #333', padding: '15px', borderRadius: '15px', marginBottom: '15px' }}>
                        <div style={{ fontSize: '10px', color: '#666', marginBottom: '5px' }}>ENTER SYMBOL + ENTER</div>
                        <input 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)}
                            onKeyDown={handleKey}
                            style={{ background: '#000', color: '#3b82f6', border: '1px solid #333', width: '90%', padding: '10px', borderRadius: '8px', outline: 'none', fontWeight: 'bold' }}
                        />
                        <div style={{ fontSize: '30px', fontWeight: '900', marginTop: '10px' }}>
                            ${price ? price.toFixed(2) : 'LOADING...'}
                        </div>
                    </div>

                    <div style={{ borderLeft: '4px solid #f59e0b', background: '#111', padding: '10px', borderRadius: '10px', marginBottom: '15px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10px' }}>
                            <span style={{ color: '#f59e0b' }}>FUNDAMENTALS</span>
                            <span style={{ color: sentiment.label === 'BULLISH' ? '#22c55e' : sentiment.label === 'BEARISH' ? '#ef4444' : '#666' }}>{sentiment.label}</span>
                        </div>
                        <div style={{ fontSize: '18px', fontWeight: 'bold' }}>{sentiment.score}% BULLISH</div>
                    </div>

                    {['scalping', 'day', 'swing'].map(s => (
                        <div key={s} style={{ background: '#0a0a0a', padding: '12px', border: '1px solid #1a1a1a', borderRadius: '10px', marginBottom: '8px' }}>
                            <div style={{ fontSize: '9px', color: '#444', marginBottom: '5px' }}>{s.toUpperCase()}</div>
                            <div style={{ 
                                textAlign: 'center', fontSize: '12px', padding: '8px', borderRadius: '5px', fontWeight: 'bold',
                                color: signals[s].includes('BUY') || signals[s].includes('LONG') ? '#22c55e' : signals[s].includes('SELL') || signals[s].includes('SHORT') ? '#ef4444' : '#444'
                            }}>
                                {signals[s]}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TradeSyncPro />);
    </script>
</body>
</html>
