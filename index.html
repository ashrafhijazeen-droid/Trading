<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeSync Pro UI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 50%);
            color: #ffffff;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .glass-panel {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent; 
            color: #666; font-family: 'Inter', sans-serif; font-size: 11px; 
            font-weight: 800; cursor: pointer; transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: #fff; border-bottom: 2px solid #00e676; background: rgba(255, 255, 255, 0.03);
        }

        .watchlist-item { transition: all 0.2s ease; border: 1px solid transparent; }
        .watchlist-item:hover { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1); }

        .news-item { transition: all 0.2s ease; border-left: 3px solid transparent; }
        .news-item:hover { background: rgba(255, 255, 255, 0.05); border-left: 3px solid #00e676; }

        .neon-text-green { color: #00e676; text-shadow: 0 0 10px rgba(0, 230, 118, 0.3); }
        .neon-text-red { color: #ff3d00; text-shadow: 0 0 10px rgba(255, 61, 0, 0.3); }
        .number-font { font-family: 'JetBrains Mono', monospace; }
        input::placeholder { color: #555; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
